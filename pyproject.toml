[tool.ruff]
line-length = 110
target-version = "py310"
extend-exclude = [".venv", "venv", "__pycache__"]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "F",  # pyflakes
    "I",  # isort
    "B",  # bugbear
    "UP", # pyupgrade
    "SIM",# simplify
    "RUF",# ruff-specific
]
ignore = [
    "E501",  # line-too-long (covered by formatter)
    "B008",  # do not perform function calls in argument defaults
    "B904",  # raise from inside except
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-q"